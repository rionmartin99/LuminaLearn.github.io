    <style>
        /* Custom Utilities */
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #F8FAFC;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* Locked State Pattern */
        .locked-pattern {
            background-color: #f3f4f6;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* Checkbox Animation */
        .check-anim {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            transition: stroke-dashoffset 0.3s;
        }

        .checked .check-anim {
            stroke-dashoffset: 0;
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #14b8a6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInInfinite {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0.3; }
            100% { transform: scale(2); opacity: 0; }
        }
        .animate-ripple {
            animation: ripple 2s infinite;
        }
    </style>
</head>

                    <span class="text-xs font-bold text-brand-600" id="progress-text">0%</span>
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-300 transition-colors duration-300"
                        id="check-status-icon">
                        <i class="ph-fill ph-check"></i>

            </div>

            <!-- Progress Bar Line -->

                style="width: 0%"></div>

            <!-- Content Injected Here -->
        </div>

        <div id="reader-footer" class="p-4 border-t border-slate-100 bg-white shrink-0">
            <button id="mark-read-btn" onclick="app.handlers.completeReading()" disabled
                class="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed bg-brand-600 text-white shadow-lg shadow-brand-500/30 hover:bg-brand-700">
                <span id="mark-read-text">Read More to Complete</span>
                <i class="ph-bold ph-check-circle"></i>

    <!-- CONFETTI CANVAS -->
    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <script>
        /**
         * CAMERA SERVICE
         * Centralized singleton for managing the camera stream.
         * Prevents duplicate getUserMedia requests and handles browser blocks.
         */
        const CameraService = {
            state: {
                activeStream: null,
                isRequesting: false,
                lastError: null,
                hasProbed: false
            },

            /**
             * MINIMAL REQUEST: Strictly mirror user's working test script.
             * Removed probePermissions() as multiple calls can trigger hardware locks on some devices.
             */
            async getStream(forceNew = false) {
                // If we already have a functional stream, reuse it
                if (this.state.activeStream && !forceNew) {
                    const tracks = this.state.activeStream.getTracks();
                    if (tracks.length > 0 && tracks.every(t => t.readyState === 'live')) {
                        return this.state.activeStream;
                    }
                }

                // DIRECT ACCESS: Stripped of state guards to prevent GAS environment interference
                try {
                    console.log("[Camera] Requesting stream {video: {facingMode:'user'}}");
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    this.state.activeStream = stream;
                    return stream;
                } catch (err) {
                    console.error("[Camera] Stream request failed:", err);
                    this.state.lastError = err;
                    throw err;
                }
            },

            /**
             * HARDWARE KILL: Stop tracks immediately to free memory/CPU/Hardware.
             * This mirrors the logic in Hunter Terminal that solves persistent "Busy" errors.
             */
            stopStream() {
                if (this.state.activeStream) {
                    const tracks = this.state.activeStream.getTracks();
                    tracks.forEach(track => {
                        track.stop();
                        track.enabled = false;
                    });
                    this.state.activeStream = null;
                    console.log("[CameraService] Hardware Released.");
                }
            },

            handleError(err) {
                let msg = "Camera Access Blocked";
                let detail = "Please click the lock icon (Address Bar) and set Camera to 'Allow'.";

                // Detect Environment Issues
                const isSecure = window.isSecureContext;
                const isGas = window.location.hostname.includes('googleusercontent.com');
                const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

                // Mapping specific error codes to user-friendly instructions
                const errorName = err.name || err.toString();

                if (!hasMedia) {
                    msg = "Hardware API Missing";
                    detail = "Your browser doesn't support camera access in this context. Please use Chrome/Edge and ensure you are on a Secure (HTTPS) connection.";
                } else if (!isSecure) {
                    msg = "Insecure Context Detected";
                    detail = "Browsers block cameras on non-HTTPS sites. Please host this on a secure server.";
                } else if (errorName.includes('NotAllowedError') || errorName.includes('PermissionDeniedError')) {
                    msg = "Camera Permission Denied";
                    detail = "Access was blocked. Please click the lock or camera icon in your address bar and set Camera to 'Allow'.";
                } else if (errorName.includes('NotFoundError') || errorName.includes('DevicesNotFoundError')) {
                    msg = "No Camera Detected";
                    detail = "We couldn't find a camera. Please ensure it's plugged in and recognized by your system.";
                } else if (errorName.includes('NotReadableError') || errorName.includes('TrackStartError')) {
                    msg = "Camera Already in Use";
                    detail = "Another app (Zoom, Teams, etc.) is likely using your camera. Please close other apps and try again.";
                }

                return { title: msg, detail: detail, original: err, isSecure, isGas };
            }
        };

        /**
         * MONITORING SERVICE
         * Handles activity audit logging and uses CameraService for heartbeat snapshotting
         */
        const MonitorService = {
            state: {
                active: false,
                moduleId: null,
                video: null,
                interval: null,
                logs: [],
                snapshotQuality: 0.5,
                stats: {
                    alerts: 0,
                    tabSwitches: 0,
                    clipboard: 0,
                    snapshots: 0,
                    totalTimeAway: 0
                },
                lastHiddenTime: null
            },

            async start(modId, baselinePhoto = null, existingStream = null) {
                if (this.state.active) return;
                this.state.active = true;
                this.state.moduleId = modId;
                this.state.logs = [];
                this.log('System', 'Monitoring Started', 'Quiz Session Initiated');

                if (baselinePhoto) {
                    this.log('Snapshot', 'Identity Confirmed', `<br><img src="${baselinePhoto}" class="mt-2 rounded border-2 border-brand-500 w-full max-w-[200px]">`);
                }

                // Initialize Camera (Heartbeat) - Always get from CameraService
                try {
                    const stream = await CameraService.getStream();
                    
                    this.state.video = document.createElement('video');
                    this.state.video.srcObject = stream;
                    this.state.video.autoplay = true;
                    this.state.video.playsInline = true;
                    
                    this.log('System', 'Optical Heartbeat', 'Camera Stream Active');

                    // 1s delay allows camera hardware to expose/focus correctly (from MonitoringLumina.html)
                    setTimeout(() => this.takeSnapshot(), 1000);
                    this.state.interval = setInterval(() => this.takeSnapshot(), 60000);
                } catch (e) {
                    const err = CameraService.handleError(e);
                    this.log('Alert', 'Camera Connection Failed', err.title);
                }

                // Listen for sensitive events
                this.setupListeners();
            },

            stop() {
                if (!this.state.active) return;
                this.state.active = false;
                
                if (this.state.interval) clearInterval(this.state.interval);
                // We don't stop the stream here because it's managed by CameraService
                // and might be needed by other components (though usually quiz end = app end)
                
                // Final sync
                this.sync();
                this.removeListeners();
                this.log('System', 'Monitoring Stopped', 'Quiz Session Ended');
            },

            setupListeners() {
                this._handlers = {
                    visibility: () => {
                        if (document.hidden) {
                            this.state.lastHiddenTime = Date.now();
                            this.log('State', 'Tab Hidden', 'Student left the page');
                        } else {
                            let duration = 0;
                            if (this.state.lastHiddenTime) {
                                duration = Math.round((Date.now() - this.state.lastHiddenTime) / 1000);
                                this.state.stats.totalTimeAway += duration;
                                this.state.lastHiddenTime = null;
                            }
                            this.log('State', 'Tab Focused', `Student returned after ${duration}s`);
                        }
                    },
                    copy: () => this.log('Clipboard', 'Content Copied', 'To Clipboard'),
                    paste: (e) => {
                        let content = (e.clipboardData || window.clipboardData).getData('text');
                        let preview = content.length > 30 ? content.substring(0, 30) + '...' : content;
                        this.log('Clipboard', 'Content Pasted', `"${preview}"`);
                    }
                };

                document.addEventListener('visibilitychange', this._handlers.visibility);
                document.addEventListener('copy', this._handlers.copy);
                document.addEventListener('paste', this._handlers.paste);
            },

            removeListeners() {
                if (!this._handlers) return;
                document.removeEventListener('visibilitychange', this._handlers.visibility);
                document.removeEventListener('copy', this._handlers.copy);
                document.removeEventListener('paste', this._handlers.paste);
            },

            log(type, message, detail = '') {
                const entry = {
                    t: new Date().toLocaleTimeString(),
                    type,
                    msg: message,
                    det: detail
                };
                this.state.logs.push(entry);
                
                // Increment stats
                if (type === 'Alert') this.state.stats.alerts++;
                if (type === 'State') this.state.stats.tabSwitches++;
                if (type === 'Clipboard') this.state.stats.clipboard++;
                if (type === 'Snapshot') this.state.stats.snapshots++;

                console.log(`[Monitor] ${type}: ${message} ${detail}`);
                
                // Sync every 5 events or immediately for serious ones
                if (this.state.logs.length % 5 === 0 || type === 'Alert') {
                    this.sync();
                }
            },

            takeSnapshot() {
                if (!this.state.active || !this.state.video) return;
                
                const canvas = document.createElement('canvas');
                canvas.width = 320;
                canvas.height = (this.state.video.videoHeight / this.state.video.videoWidth) * 320 || 240;
                
                if (canvas.width === 0) return;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(this.state.video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', this.state.snapshotQuality);
                
                this.log('Snapshot', 'Heartbeat Captured', `<br><img src="${dataUrl}" class="mt-2 rounded border border-slate-200 w-full max-w-[150px]">`);
            },

            sync() {
                if (!this.state.moduleId || !app.state.userId) return;
                const logsJson = JSON.stringify(this.state.logs);
                
                BackEndService.call('saveMonitoringData', [app.state.userId, this.state.moduleId, logsJson])
                    .catch(err => console.error("Monitor Sync Error:", err));
            }
        };

        /**
         * BACKEND SERVICE (Bridge between GAS and Standalone)
         */
        const BackEndService = {
            async call(action, args = []) {
                // 1. GAS Mode
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    return new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            [action].apply(google.script.run, args);
                    });
                }

                // 2. Standalone Mode (Fetch)
                const apiUrl = STANDALONE_CONFIG.API_URL;
                if (!apiUrl && STANDALONE_CONFIG.isStandalone) {
                    this.promptForUrl();
                    throw new Error("Backend URL not configured.");
                }

                try {
                    // Determine if it's a retrieval (GET) or mutation (POST)
                    const getActions = ['getData', 'getOnlineStudents', 'getClassCode', 'getStudentProfile', 'getVideoUrl', 'getMonitoringDetails', 'getPdfContent'];
                    const isGet = getActions.includes(action);

                    if (isGet) {
                        const url = new URL(apiUrl);
                        url.searchParams.append('api', action);
                        if (args && args.length > 0) url.searchParams.append('args', JSON.stringify(args));
                        
                        const response = await fetch(url.toString());
                        const res = await response.json();
                        return res.success ? res.data : Promise.reject(res.error);
                    } else {
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            body: JSON.stringify({ action, args }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });
                        const res = await response.json();
                        return res.success ? res.data : Promise.reject(res.error);
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                    throw err;
                }
            },

            promptForUrl() {
                const overlay = document.getElementById('loading-overlay');
                if (!overlay) return;
                
                overlay.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-slate-100 fade-in">
                        <div class="w-16 h-16 bg-brand-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                            <i class="ph-bold ph-link text-brand-600 text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900 text-center mb-2">Connect to Backend</h3>
                        <p class="text-slate-500 text-sm text-center mb-6">Paste your Lumina Web App URL to sync data with Google Sheets.</p>
                        <input type="text" id="api-url-input" placeholder="https://script.google.com/.../exec" 
                            class="w-full p-4 rounded-xl bg-slate-50 border border-slate-200 focus:border-brand-500 focus:bg-white focus:outline-none mb-4 text-xs font-mono">
                        <button onclick="BackEndService.saveUrl()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-800 transition-all">
                            Connect Now
                        </button>
                    </div>
                `;
                overlay.classList.remove('hidden');
            },

            saveUrl() {
                const url = document.getElementById('api-url-input').value.trim();
                if (url && url.startsWith('https://script.google.com')) {
                    localStorage.setItem('lumina_api_url', url);
                    location.reload();
                } else {
                    alert("Please enter a valid Google Apps Script Web App URL.");
                }
            }
        };

        /**
         * GAS DATA SERVICE (Refactored to use BackEndService)
         */
        const DataService = {
            async load(callback) {
                try {
                    const res = await BackEndService.call('getData');
                    const data = typeof res === 'string' ? JSON.parse(res) : res;
                    callback(data);
                } catch (err) {
                    console.error("Data Load Error:", err);
                    if (STANDALONE_CONFIG.isStandalone && !STANDALONE_CONFIG.API_URL) return; // Prompt already shown
                    const overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        overlay.innerHTML = `<div class="text-red-500 text-center p-4"><div class="text-4xl mb-2">⚠️</div><h3 class="font-bold">Connection Failed</h3><p class="text-sm mt-2">${err.message || err}</p><button onclick="location.reload()" class="mt-4 px-4 py-2 bg-slate-800 text-white rounded-lg">Retry</button></div>`;
                    }
                }
            },

            async submitProgress(modId, step, value, studentInfo, points, callback) {
                const userId = app.state.userId;
                if (typeof points === 'function') { callback = points; points = null; }
                if (typeof studentInfo === 'function') { callback = studentInfo; studentInfo = null; }

                try {
                    await BackEndService.call('saveProgress', [userId, modId, step, value, studentInfo, points]);
                    if (callback) callback();
                } catch (err) {
                    console.error("Save Progress Error:", err);
                    if (callback) callback({ success: false, error: err });
                }
            },

            async uploadModule(formObject, callback) {
                try {
                    // Note: uploadModule in GAS only supports formObject in GAS context.
                    // In standalone, we might need to handle base64 encoding or similar.
                    // For now, we assume GAS context for uploads or specialized handling.
                    const res = await BackEndService.call('uploadModule', [formObject]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err.toString() });
                }
            },

            async register(firstName, lastName, grade, section, password, classCode, username, callback) {
                try {
                    const res = await BackEndService.call('registerStudent', [firstName, lastName, grade, section, password, classCode, username]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async login(userId, password, callback) {
                try {
                    const res = await BackEndService.call('loginStudent', [userId, password]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async logout(userId, callback) {
                try {
                    const res = await BackEndService.call('logoutStudent', [userId]);
                    if (callback) callback(res);
                } catch (err) {
                    if (callback) callback({ success: false, error: err });
                }
            },

            async pingOnline(userId, activity, loginTime) {
                try {
                    let actPayload = activity ? {...activity} : {};
                    if (MonitorService.state.active) {
                        actPayload.stats = MonitorService.state.stats;
                    }
                    const actStr = JSON.stringify(actPayload);
                    await BackEndService.call('pingOnlineStatus', [userId, actStr, loginTime || '']);
                } catch (err) {}
            },

            async getOnlineStudents(callback) {
                try {
                    const res = await BackEndService.call('getOnlineStudents');
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async generateClassCode(callback) {
                const userId = app.state.userId;
                try {
                    const res = await BackEndService.call('generateClassCode', [userId]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async getClassCode(callback) {
                try {
                    const res = await BackEndService.call('getClassCode');
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async toggleModuleStatus(modId, expiration, isActive, callback) {
                const userId = app.state.userId;
                try {
                    const res = await BackEndService.call('updateModuleSettings', [userId, modId, expiration, isActive]);
                    if (callback) callback(res);
                } catch (err) {
                    if (callback) callback({ success: false, error: err });
                }
            },

            async getStudentProfile(userId, callback) {
                try {
                    const res = await BackEndService.call('getStudentProfile', [userId]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async updateUsername(userId, newUsername, callback) {
                try {
                    await BackEndService.call('updateUsername', [userId, newUsername]);
                    callback({ success: true });
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async changePassword(userId, oldPassword, newPassword, callback) {
                try {
                    const res = await BackEndService.call('changePassword', [userId, oldPassword, newPassword]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async resetPassword(firstName, lastName, grade, section, newPassword, callback) {
                try {
                    const res = await BackEndService.call('resetPassword', [firstName, lastName, grade, section, newPassword]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },

            async getVideoUrl(fileId, callback) {
                try {
                    const res = await BackEndService.call('getVideoUrl', [fileId]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            },
            
            async getPdfContent(fileId, callback) {
                try {
                    const res = await BackEndService.call('getPdfContent', [fileId]);
                    callback(res);
                } catch (err) {
                    callback({ success: false, error: err });
                }
            }
        };

        /**
         * CONTENT CACHE (sessionStorage)
         * Caches PDF/HTML base64 data to avoid re-fetching from backend on revisit.
         */
        const ContentCache = {
            _prefix: 'lumina_cache_',
            get(fileId) {
                try {
                    return sessionStorage.getItem(this._prefix + fileId);
                } catch (e) { return null; }
            },
            set(fileId, data) {
                try {
                    sessionStorage.setItem(this._prefix + fileId, data);
                } catch (e) {
                    // Quota exceeded — silently fail
                    console.warn('ContentCache: sessionStorage quota exceeded, skipping cache.');
                }
            },
            clear() {
                try {
                    const keys = [];
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const key = sessionStorage.key(i);
                        if (key && key.startsWith(this._prefix)) keys.push(key);
                    }
                    keys.forEach(k => sessionStorage.removeItem(k));
                } catch (e) {}
            }
        };

        /**
         * APP LOGIC
         */
        const app = {
            state: {
                view: 'dashboard',
                userMode: 'student',
                scriptUrl: STANDALONE_CONFIG.API_URL || '<?= scriptUrl ?>',
                activeFilter: { grade: 'All', subject: 'All' },
                data: { modules: [], progress: {}, subjects: [] },
                readingProgress: 0,
                activeReaderModId: null,
                activeReaderType: null, // 'content' or 'activity'
                userId: null,
                studentInfo: null, // Stores { name, grade, section } per session
                loginTime: null, // ISO string of when student logged in
                currentActivity: { moduleId: null, moduleTitle: null, step: 'Browsing' },
                pdfState: {
                    pdfDoc: null,
                    pageNum: 1,
                    numPages: 0,
                    scale: 1.0,
                    offsetX: 0,
                    offsetY: 0,
                    isDragging: false,
                    lastX: 0,
                    lastY: 0
                }
            },

            async init() {
                // Generate/Retrieve Session ID
                let uid = localStorage.getItem('lumina_uid');
                let studentData = localStorage.getItem('lumina_student');
                let savedMode = localStorage.getItem('lumina_userMode');

                if (savedMode) {
                    this.state.userMode = savedMode;
                }

                if (!studentData) {
                    // No valid session, push to Auth
                    this.state.authMode = 'login';
                    this.state.view = 'auth';
                }

                if (uid) {
                    this.state.userId = uid;
                }
                if (studentData) {
                    try {
                        this.state.studentInfo = JSON.parse(studentData);
                        // Also show logout button
                        document.getElementById('modeToggleBtn').classList.remove('hidden');
                        
                        // Restore loginTime from localStorage
                        this.state.loginTime = localStorage.getItem('lumina_loginTime') || new Date().toISOString();
                        
                        if (this.state.view !== 'auth') {
                            // Filter by grade automatically
                            this.state.activeFilter.grade = this.state.studentInfo.grade || 'All';
                        }
                    } catch(e) {}
                }
                
                // Set up intervals for real-time features
                setInterval(() => {
                    if (this.state.userId && this.state.userMode !== 'teacher') {
                        DataService.pingOnline(this.state.userId, this.state.currentActivity, this.state.loginTime);
                    } else if (this.state.userMode === 'teacher') {
                        // refresh online list if DOM exists
                        if (document.getElementById('online-students-list')) {
                            this.handlers.refreshOnlineStudents();
                        }
                    }
                }, 30000); // Poll every 30 seconds

                // If going to auth, render immediately (don't wait for data load)
                if (this.state.view === 'auth') {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    this.render();
                }

                DataService.load((data) => {
                    if (data) {
                        this.state.data = data;
                        document.getElementById('loading-overlay').classList.add('hidden');
                        this.render();
                    } else {
                        console.error("Critical: Init received null data.");
                        document.getElementById('loading-overlay').innerHTML = `<div class="text-red-500 text-center p-4"><h3 class="font-bold">Data Error</h3><p>Could not initialize application data.</p><button onclick="location.reload()" class="mt-4 bg-slate-800 text-white px-4 py-2 rounded">Retry</button></div>`;
                    }
                });
            },

            refreshData(callback) {
                DataService.load((data) => {
                    if (data) {
                        this.state.data = data;
                        if (callback) callback();
                        else this.render();
                    } else {
                        console.error("Critical: Received null data from backend. Retaining previous state.");
                        // Attempt to recover or notify user if state is empty
                        if (!this.state.data) {
                            document.getElementById('loading-overlay').innerHTML = `<div class="text-red-500 text-center p-4"><h3 class="font-bold">Data Error</h3><p>Could not load application data.</p><button onclick="location.reload()" class="mt-4 bg-slate-800 text-white px-4 py-2 rounded">Reload</button></div>`;
                            document.getElementById('loading-overlay').classList.remove('hidden');
                        } else {
                            if (callback) callback(); // Proceed with old data?
                        }
                    }
                });
            },

            showToast(message, type = 'success') {
                let container = document.getElementById('toast-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'toast-container';
                    container.className = 'fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none';
                    document.body.appendChild(container);
                }

                const toast = document.createElement('div');
                const isError = type === 'error';
                const bgColor = isError ? 'bg-red-500 shadow-red-500/30' : 'bg-slate-900 shadow-slate-900/30';
                const icon = isError ? 'ph-warning-octagon' : 'ph-check-circle';

                toast.className = `${bgColor} text-white pl-4 pr-6 py-3 rounded-xl shadow-lg flex items-center gap-3 transform transition-all duration-500 translate-y-12 opacity-0 font-medium pointer-events-auto min-w-[300px] border border-white/10`;
                toast.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                        <i class="ph-fill ${icon} text-lg"></i>
                    </div>
                    <div>${message}</div>
                `;

                container.appendChild(toast);

                // Animate In
                requestAnimationFrame(() => {
                    toast.classList.remove('translate-y-12', 'opacity-0');
                });

                // Remove after 4s
                setTimeout(() => {

            render() {
                // Nav States
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-brand-600', 'text-slate-400'));

                if (document.querySelectorAll('.nav-btn')[activeNav]) {
                    document.querySelectorAll('.nav-btn')[activeNav].classList.replace('text-slate-400', 'text-brand-600');
                }

                // Hide Teacher UI if in Student Mode (forced or toggled)
                const isTeacher = this.state.userMode === 'teacher';
                const teacherNavs = ['nav-upload', 'nav-class-management'];
                teacherNavs.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.toggle('hidden', !isTeacher);
                });

                // Show Modules nav: Visible for teachers OR logged-in students
                const dashNav = document.getElementById('nav-dashboard');
                if (dashNav) {
                    const showModules = isTeacher || !!this.state.studentInfo;
                    dashNav.classList.toggle('hidden', !showModules);

                // Show profile nav for logged-in students only
                const profileNav = document.getElementById('nav-profile');
                if (profileNav) {
                    profileNav.classList.toggle('hidden', !(this.state.studentInfo && this.state.userMode === 'student'));

                document.getElementById('roleDisplay').textContent = isTeacher ? 'Teacher' : 'Student';

                        logoutBtn.classList.add('hidden');

                container.innerHTML = '';

                switch (this.state.view) {
                    case 'auth': container.appendChild(this.components.auth()); break;
                    case 'dashboard': container.appendChild(this.components.dashboard()); break;
                    case 'module': container.appendChild(this.components.moduleView(this.state.activeModuleId)); break;
                    case 'upload': container.appendChild(this.components.uploadForm()); break;

                    this.state.currentActivity = {
                        moduleId: param,
                        moduleTitle: mod ? mod.title : param,

                    };

                this.render();

                    let historyRows = [];

                                date: entry.timestamp || 0
                            };

                            if (entry.app === 'pending') {
                                pendingRows.push(row);
                            } else {
                                historyRows.push(row);
                            }
                        }
                    });

                    // Sort: Pending by Name, History by Date Desc
                    pendingRows.sort((a, b) => a.student.localeCompare(b.student));

                    const modal = document.getElementById('modal-overlay');
                    modal.innerHTML = `

                                    return;
                                }

                                // Analytics Summary calculation
                                const stats = logs.reduce((acc, log) => {
                                    if (log.type === 'Alert') acc.alerts++;
                                    if (log.type === 'State') {
                                        if (log.msg === 'Tab Hidden') acc.tabSwitches++;
                                        // Parse duration from detail "Student returned after Xs"
                                        const match = log.det.match(/after (\d+)s/);
                                        if (match) acc.totalDuration += parseInt(match[1]);
                                    }
                                    if (log.type === 'Clipboard') acc.clipboard++;
                                    if (log.type === 'Snapshot') acc.snapshots++;

                                let riskLevel = 'Safe';
                                let riskColor = 'text-green-600 bg-green-50';
                                let riskIcon = 'ph-check-circle';

                                    riskIcon = 'ph-warning-octagon';

                                    riskIcon = 'ph-warning';

                                content.innerHTML = `

                                                <i class="ph-bold ${riskIcon}"></i>
                                            </div>
                                            <div>
                                                <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Risk Assessment</div>
                                                <div class="text-xl font-black ${riskColor.split(' ')[0]}">${riskLevel}</div>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Time Away</div>
                                            <div class="text-xl font-black text-slate-800">${stats.totalDuration}s</div>
                                        </div>
                                    </div>

                                    <!-- Behavior Analytics Summary -->
                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                                        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-soft flex flex-col items-center justify-center text-center">
                                            <div class="w-8 h-8 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-1">
                                                <i class="ph-bold ph-warning"></i>
                                            </div>
                                            <span class="text-xl font-black text-slate-800">${stats.alerts}</span>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">Alerts</span>
                                        </div>
                                        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-soft flex flex-col items-center justify-center text-center">
                                            <div class="w-8 h-8 rounded-full bg-amber-50 text-amber-500 flex items-center justify-center mb-1">
                                                <i class="ph-bold ph-monitor"></i>
                                            </div>
                                            <span class="text-xl font-black text-slate-800">${stats.tabSwitches}</span>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">Tab Switch</span>
                                        </div>
                                        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-soft flex flex-col items-center justify-center text-center">
                                            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mb-1">
                                                <i class="ph-bold ph-copy"></i>
                                            </div>
                                            <span class="text-xl font-black text-slate-800">${stats.clipboard}</span>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">Clipboard</span>
                                        </div>
                                        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-soft flex flex-col items-center justify-center text-center">
                                            <div class="w-8 h-8 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center mb-1">
                                                <i class="ph-bold ph-camera"></i>
                                            </div>
                                            <span class="text-xl font-black text-slate-800">${stats.snapshots}</span>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">Total Log</span>
                                        </div>
                                    </div>

                                    <div class="space-y-3">
                                        ${logs.map(log => {
                                            let typeColor = 'bg-slate-100 text-slate-600';
                                            let icon = 'ph-info';
                                            if (log.type === 'Alert') { typeColor = 'bg-red-100 text-red-700'; icon = 'ph-warning'; }
                                            if (log.type === 'Clipboard') { typeColor = 'bg-blue-100 text-blue-700'; icon = 'ph-copy'; }
                                            if (log.type === 'Snapshot') { typeColor = 'bg-purple-100 text-purple-700'; icon = 'ph-camera'; }
                                            if (log.type === 'State') { typeColor = 'bg-amber-100 text-amber-700'; icon = 'ph-eye'; }

                                            return `
                                                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex gap-4">
                                                    <div class="w-10 h-10 rounded-lg ${typeColor} flex items-center justify-center shrink-0">
                                                        <i class="ph-bold ${icon} text-lg"></i>
                                                    </div>
                                                    <div class="min-w-0 flex-1">
                                                        <div class="flex justify-between items-start">
                                                            <span class="text-[10px] font-black uppercase tracking-widest ${typeColor.split(' ')[1]} opacity-70">${log.type}</span>

                                    </div>

                            } else {
                                document.getElementById('monitoring-content').innerHTML = `
                                    <div class="text-center py-20 text-red-500">
                                        <i class="ph-bold ph-warning-octagon text-4xl mb-2"></i>
                                        <p>${(res && res.error) || 'Monitoring data not found.'}</p>
                                    </div>
                                `;
                            }
                        })
                        .catch(err => {
                            document.getElementById('monitoring-content').innerHTML = `
                                <div class="text-center py-20 text-red-500">
                                    <i class="ph-bold ph-warning-octagon text-4xl mb-2"></i>
                                    <p>Connection Error: ${err.message || err}</p>
                                </div>
                            `;
                        });
                },
            },

            handlers: {

                generateNewCode() {
                    const btn = event.currentTarget;
                    const ogText = btn.textContent;
                    btn.textContent = "Generating...";
                    btn.disabled = true;

                    DataService.generateClassCode((res) => {
                        btn.textContent = ogText;

                copyCode() {
                    const el = document.getElementById('active-class-code');
                    if(el && el.textContent && el.textContent !== '------' && el.textContent !== 'None') {
                        navigator.clipboard.writeText(el.textContent).then(() => {
                            app.showToast("Code copied to clipboard!", "success");
                        });
                    }
                },

                refreshOnlineStudents() {
                    const listEl = document.getElementById('online-students-list');
                    if(!listEl) return;
                    
                    DataService.getOnlineStudents((res) => {
                        if (res.success) {
                            if (res.students && res.students.length > 0) {
                                listEl.innerHTML = res.students.map(s => {
                                    // Format online duration
                                    let durationText = '';
                                    if (s.onlineMinutes !== undefined) {
                                        if (s.onlineMinutes < 1) durationText = 'Just now';
                                        else if (s.onlineMinutes < 60) durationText = s.onlineMinutes + 'm';
                                        else durationText = Math.floor(s.onlineMinutes / 60) + 'h ' + (s.onlineMinutes % 60) + 'm';
                                    }
                                    const stepBadge = s.step ? `<span class="text-[9px] font-bold uppercase px-1.5 py-0.5 rounded bg-brand-50 text-brand-600">${s.step}</span>` : '';
                                    const moduleText = s.moduleTitle ? `<span class="text-[10px] text-slate-500 truncate block">${s.moduleTitle}</span>` : '';
                                    
                                    const st = s.stats || { alerts: 0, tabSwitches: 0, clipboard: 0, totalTimeAway: 0 };
                                    const isHighRisk = st.alerts >= 1 || st.tabSwitches >= 3 || st.clipboard >= 2 || st.totalTimeAway > 60;

                                    const alertIndicator = st.alerts > 0 || isHighRisk ? `
                                        <div class="relative flex items-center justify-center w-4 h-4 mr-1">
                                            <span class="animate-ripple absolute inline-flex h-full w-full rounded-full ${isHighRisk ? 'bg-red-500' : 'bg-red-400'} opacity-75"></span>
                                            <i class="ph-fill ${isHighRisk ? 'ph-warning-octagon' : 'ph-warning'} absolute text-[10px] ${isHighRisk ? 'text-red-700' : 'text-red-600'}"></i>

                                    ` : '';

                                    return `

                                        </div>

                downloadResultsCSV(modId) {
                    app.showToast('Generating CSV...', 'info');

                    let downloadUrl = app.state.scriptUrl;

                    // If standalone, use the API_URL directly
                    if (STANDALONE_CONFIG.isStandalone && STANDALONE_CONFIG.API_URL) {
                        downloadUrl = STANDALONE_CONFIG.API_URL;
                    }

                    // Append action and modId
                    // Handle existing query params if any
                    const separator = downloadUrl.includes('?') ? '&' : '?';
                    downloadUrl += separator + "action=downloadResults&modId=" + encodeURIComponent(modId);

                    console.log("Downloading from:", downloadUrl);
                    window.open(downloadUrl, '_blank');

                    setTimeout(() => app.showToast('CSV Download Started!', 'success'), 1000);
                },

                markComplete(modId, step, status = true) {
                    // Logic: If Student is submitting Activity (status === 'pending'), show Modal first.
                    // If Teacher, just proceed.
                    const isTeacher = app.state.userMode === 'teacher';

                    if (!isTeacher && step === 'app' && status === 'pending') {
                        app.handlers.showStudentDetailsModal(modId, (details) => {
                            // On Confirm, submit with details
                            // Note: submitProgress uses app.state.studentInfo, which we updated in the modal.
                            // But also passing it explicitly is safer if supported.
                            DataService.submitProgress(modId, step, status, details, null, () => {
                                app.refreshData();
                                app.showToast('Activity Submitted!', 'success');
                            });
                        });
                    } else {
                        // Standard complete (Content or Teacher actions)
                        DataService.submitProgress(modId, step, status, null, null, () => {
                            app.refreshData();
                        });
                    }
                },

                confirmSubmission(userId, modId) {
                    BackEndService.call('saveProgress', [userId, modId, 'app', 'completed', null, null])
                        .then(() => {
                            app.showToast('Submission Confirmed', 'success');
                            app.refreshData(); // Refresh UI
                            setTimeout(() => {
                                app.components.showActivitySubmissions(modId);
                            }, 1500); // Wait for data refresh
                        })
                        .catch(err => {
                            app.showToast('Failed to confirm: ' + (err.message || err), 'error');
                        });
                },

                // UNIFIED DOCUMENT VIEWER
                openViewer(modId, type) {
                    app.state.activeReaderModId = modId;
                    app.state.activeReaderType = type;
                    app.state.readingProgress = 0;
                    const mod = app.state.data.modules.find(m => m.id === modId);

                    // Update current activity for teacher monitoring
                    const stepLabel = type === 'content' ? 'Viewing Content' : 'Viewing Activity';
                    app.state.currentActivity = {
                        moduleId: modId,
                        moduleTitle: mod ? mod.title : modId,
                        step: stepLabel
                    };

                    // UI Elements
                    const modal = document.getElementById('reader-modal');
                    const titleEl = document.getElementById('reader-title');
                    const subTitleEl = document.getElementById('reader-subtitle');
                    const content = document.getElementById('reader-content');
                    const progressBar = document.getElementById('reader-progress-bar');

                // PDF RENDERING HELPERS
                async renderPdf(data) {
                    try {
                        const loadingTask = pdfjsLib.getDocument({ data: data });
                        app.state.pdfState.pdfDoc = await loadingTask.promise;
                        app.state.pdfState.numPages = app.state.pdfState.pdfDoc.numPages;
                        app.state.pdfState.pageNum = 1;

                        document.getElementById('page-count').textContent = app.state.pdfState.numPages;
                        document.getElementById('page-num').textContent = 1;

                        app.state.pdfState.scale = 1.0;
                        app.state.pdfState.offsetX = 0;
                        app.state.pdfState.offsetY = 0;
                        app.handlers.renderPage();

                        // Setup Touch/Mouse Handlers
                        const canvas = document.getElementById('pdf-render');
                        const container = canvas.parentElement;

                        // Mouse/Touch Pan Logic
                        // Mouse/Touch Pan & Zoom Logic
                        const getDistance = (e) => {
                            if (e.touches.length < 2) return 0;
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            return Math.hypot(dx, dy);
                        };

                        const startPan = (e) => {
                            if (e.touches && e.touches.length === 2) {
                                app.state.pdfState.isPinching = true;
                                app.state.pdfState.startDist = getDistance(e);
                                app.state.pdfState.startScale = app.state.pdfState.scale;
                                return;
                            }
                            app.state.pdfState.isDragging = true;
                            app.state.pdfState.lastX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                            app.state.pdfState.lastY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                            canvas.style.cursor = 'grabbing';
                        };

                        const movePan = (e) => {
                            if (app.state.pdfState.isDragging || app.state.pdfState.isPinching) {
                                e.preventDefault(); // Prevent browser scroll/zoom
                            }

                            if (app.state.pdfState.isPinching && e.touches && e.touches.length === 2) {
                                const newDist = getDistance(e);
                                const scaleChange = newDist / app.state.pdfState.startDist;
                                let newScale = app.state.pdfState.startScale * scaleChange;

                                // Limit Scale
                                newScale = Math.min(Math.max(0.5, newScale), 5.0);

                                app.state.pdfState.scale = newScale;
                                app.handlers.updateCanvasTransform();
                                document.getElementById('zoom-level').textContent = Math.round(newScale * 100) + '%';
                                return;
                            }

                            if (!app.state.pdfState.isDragging) return;

                            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                            const deltaX = clientX - app.state.pdfState.lastX;
                            const deltaY = clientY - app.state.pdfState.lastY;

                            app.state.pdfState.offsetX += deltaX;
                            app.state.pdfState.offsetY += deltaY;

                            app.state.pdfState.lastX = clientX;
                            app.state.pdfState.lastY = clientY;

                            app.handlers.updateCanvasTransform();
                        };

                        const endPan = (e) => {
                            app.state.pdfState.isDragging = false;
                            if (e.touches && e.touches.length < 2) {
                                app.state.pdfState.isPinching = false;
                            }
                            canvas.style.cursor = 'grab';
                        };

                        // Add Listeners
                        app.state.pdfState.handlers = { movePan, endPan };
                        
                        container.addEventListener('mousedown', startPan);
                        container.addEventListener('touchstart', startPan, { passive: false });

                        window.addEventListener('mousemove', movePan);
                        window.addEventListener('touchmove', movePan, { passive: false });

                        window.addEventListener('mouseup', endPan);
                        window.addEventListener('touchend', endPan);
                        window.addEventListener('touchcancel', endPan);

                    } catch (error) {
                        console.error("PDF Render Error:", error);
                        app.showToast("Error rendering PDF", 'error');
                    }
                },

                async renderPage() {
                    const pdfDoc = app.state.pdfState.pdfDoc;
                    const page = await pdfDoc.getPage(app.state.pdfState.pageNum);

                    const canvas = document.getElementById('pdf-render');
                    const ctx = canvas.getContext('2d');

                    const viewport = page.getViewport({ scale: app.state.pdfState.scale * 1.5 }); // Higher res render

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // Center initial view
                    if (app.state.pdfState.scale === 1.0 && app.state.pdfState.offsetX === 0) {
                        // Logic to fit width or centers
                        // For now just center
                    }

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };

                    await page.render(renderContext).promise;
                    app.handlers.updateCanvasTransform();
                },

                updateCanvasTransform() {
                    const canvas = document.getElementById('pdf-render');
                    // We use CSS transform for smooth panning/zooming without re-rendering canvas every frame
                    // BUT for quality zoom we re-render on zoom end.
                    // For now, let's keep it simple: Re-render on zoom, CSS transform for Pan?
                    // Actually, simple transform is better for performance.

                    canvas.style.transform = `translate(${app.state.pdfState.offsetX}px, ${app.state.pdfState.offsetY}px) scale(${app.state.pdfState.scale})`;
                },

                zoomIn() {
                    app.state.pdfState.scale += 0.2;
                    app.handlers.updateCanvasTransform();
                    document.getElementById('zoom-level').textContent = Math.round(app.state.pdfState.scale * 100) + '%';
                },

                zoomOut() {
                    if (app.state.pdfState.scale > 0.4) {
                        app.state.pdfState.scale -= 0.2;
                        app.handlers.updateCanvasTransform();
                        document.getElementById('zoom-level').textContent = Math.round(app.state.pdfState.scale * 100) + '%';
                    }
                },

                resetZoom() {
                    app.state.pdfState.scale = 1.0;
                    app.state.pdfState.offsetX = 0;
                    app.state.pdfState.offsetY = 0;
                    app.handlers.updateCanvasTransform();
                    document.getElementById('zoom-level').textContent = '100%';
                },

                prevPage() {
                    if (app.state.pdfState.pageNum <= 1) return;
                    app.state.pdfState.pageNum--;
                    app.handlers.updatePageNumDisplay();
                    app.handlers.renderPage();
                },

                nextPage() {
                    if (app.state.pdfState.pageNum >= app.state.pdfState.numPages) return;
                    app.state.pdfState.pageNum++;
                    app.handlers.updatePageNumDisplay();
                    app.handlers.renderPage();
                },

                    document.getElementById('page-num').textContent = app.state.pdfState.pageNum;

                launchQuizInterface(modId, baselinePhoto = null, existingStream = null) {
                    const mod = app.state.data.modules.find(m => m.id === modId);
                    const modal = document.getElementById('modal-overlay');
                    modal.classList.remove('hidden');

                    // --- SHUFFLING LOGIC ---
                    const shuffleArray = (array) => {
                        let currentIndex = array.length, randomIndex;
                        while (currentIndex !== 0) {
                            randomIndex = Math.floor(Math.random() * currentIndex);
                            currentIndex--;
                            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                        }
                        return array;
                    };

                    const originalQuizData = JSON.parse(JSON.stringify(mod.quiz));
                    const quizData = shuffleArray(originalQuizData).map(q => {
                        const optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.a }));
                        const shuffledOptions = shuffleArray(optionsWithIndex);
                        return {
                            ...q,
                            options: shuffledOptions.map(o => o.text),
                            a: shuffledOptions.findIndex(o => o.isCorrect)
                        };
                    });

                    let currentQ = 0;
                    let score = 0;
                    let questionTimer;
                    let timeRemaining;

                    const renderQ = () => {
                        if (currentQ >= quizData.length) {
                            const finalScore = Math.round((score / quizData.length) * 100);

                            // SUBMIT WITH STUDENT INFO AND RAW POINTS
                            const pointsStr = `${score}/${quizData.length}`;
                            DataService.submitProgress(modId, 'score', finalScore, app.state.studentInfo, pointsStr, () => {
                                app.refreshData();
                            });

                            // Stop Monitoring
                            MonitorService.stop();

                            modal.innerHTML = `
                                <div class="bg-white w-full max-w-sm rounded-2xl p-6 text-center animate-[scaleIn_0.3s_ease]">

                                        See Leaderboard

                                </div>
                            `;
                            return;
                        }

                        const q = quizData[currentQ];
                        const qEl = document.createElement('div');
                        qEl.className = "bg-white w-full max-w-md max-h-[90vh] flex flex-col rounded-2xl p-6 shadow-2xl relative overflow-hidden animate-[scaleIn_0.3s_ease]";

                        timeRemaining = 45;

                        qEl.innerHTML = `
                            <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400 uppercase tracking-wider shrink-0">
                                <span>Question ${currentQ + 1}/${quizData.length}</span>
                                 <div class="flex items-center gap-2 text-brand-600 bg-brand-50 px-3 py-1 rounded-full">
                                    <i class="ph-bold ph-timer"></i>
                                    <span id="timer-display">45</span>s
                                </div>
                                <div class="flex items-center gap-1.5 px-2 py-1 rounded-lg bg-red-50 text-red-600 animate-pulse">
                                    <div class="w-2 h-2 rounded-full bg-red-600"></div>
                                    <span class="text-[10px] font-black tracking-tighter uppercase">REC</span>
                                </div>
                                <button onclick="app.handlers.showQuizExitConfirmation('${modId}')" class="hover:text-red-500"><i class="ph-bold ph-x text-lg"></i></button>
                            </div>
                            
                            <div class="overflow-y-auto flex-1 pr-2 [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-thumb]:bg-slate-300 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:rounded-full">
                                <h4 class="text-lg font-bold text-slate-800 mb-6">${q.q}</h4>
                                <div class="space-y-3 pb-2" id="options-container">
                                    ${q.options.map((opt, idx) => `
                                        <button class="opt-btn w-full text-left p-4 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors font-medium text-slate-700" data-idx="${idx}">
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `;

                        const timerDisplay = qEl.querySelector('#timer-display');
                        questionTimer = setInterval(() => {
                            timeRemaining--;
                            timerDisplay.textContent = timeRemaining;
                            if (timeRemaining <= 10) {
                                timerDisplay.parentElement.classList.replace('text-brand-600', 'text-red-600');
                                timerDisplay.parentElement.classList.replace('bg-brand-50', 'bg-red-50');
                            }
                            if (timeRemaining <= 0) {
                                clearInterval(questionTimer);
                                // Auto-proceed logic (as if incorrect, so score does not increase)
                                qEl.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
                                setTimeout(() => {
                                    currentQ++;
                                    renderQ();
                                }, 1000);
                            }
                        }, 1000);
                        // Save timer reference globally for emergency cancel
                        window._quizTimer = questionTimer;

                        qEl.querySelectorAll('.opt-btn').forEach(btn => {
                            btn.onclick = function () {
                                clearInterval(questionTimer);
                                // Disable all buttons to prevent double click
                                qEl.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

                                const selected = parseInt(this.dataset.idx);
                                const isCorrect = selected === q.a;

                                </li>

        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#14b8a6', '#f59e0b', '#ef4444', '#3b82f6'];

            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 100
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    if (p.life > 0) {
                        active = true;
                        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life / 100;
                        ctx.fillRect(p.x, p.y, 6, 6);
                    }
                });
                if (active) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>

</html>
